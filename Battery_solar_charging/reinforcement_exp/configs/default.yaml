# Default configuration for the battery optimisation project.
# All paths are relative to the reinforcement_exp/ directory.

data:
  raw_dir: data/raw
  aggregated_dir: data/aggregated
  combined_dir: data/combined

solar:
  system_size_kwp: 2.0
  performance_ratio: 0.7
  locations:
    manchester:
      latitude: 53.48
      raw_csv: data/raw/POWER_Point_Hourly_20250701_20250731_053d38N_002d21W_LST.csv
      output_csv: data/aggregated/manchester_solar_power.csv
    barcelona:
      latitude: 41.39
      raw_csv: data/raw/POWER_Point_Hourly_20250701_20250731_041d38N_002d16E_LST.csv
      output_csv: data/aggregated/barcelona_solar_power.csv

battery:
  capacity_kwh: 10.0
  charge_efficiency: 0.90
  discharge_efficiency: 0.90
  max_charge_rate_kw: 5.0
  max_discharge_rate_kw: 5.0
  initial_soc: 0.0  # state of charge at episode start (kWh)

# Hyperparameters for RL agents (overridden per-agent in configs/dqn.yaml etc.)
